rule_id: pension_annual_allowance_effective
tax_year: 2028-29
jurisdiction: rUK
examples:
- description: No taper, no MPAA — standard AA £60,000
  source: HMRC guidance
  inputs:
    standard_annual_allowance: 60000
    tapered_annual_allowance: 60000
    mpaa_limit: 60000
  expected: 60000
- description: Tapered to £30,000, MPAA not triggered — effective AA £30,000
  source: HMRC guidance
  inputs:
    standard_annual_allowance: 60000
    tapered_annual_allowance: 30000
    mpaa_limit: 60000
  expected: 30000
- description: MPAA triggered (£10k), taper to £20k — effective AA £10,000
  source: HMRC guidance
  inputs:
    standard_annual_allowance: 60000
    tapered_annual_allowance: 20000
    mpaa_limit: 10000
  expected: 10000
