rule_id: investment_bond_top_slicing_relief
tax_year: 2027-28
jurisdiction: rUK
examples:
- description: Full tax £4k, slice tax £2k, 10 years — relief £20,000
  source: IPTM3820
  inputs:
    full_tax_due: 4000
    tax_on_annual_slice: 2000
