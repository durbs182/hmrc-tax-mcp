# Provenance: HMRC publishes the Personal Allowance taper rule in plain English at
#   https://www.gov.uk/income-tax-rates/personal-allowances
# Verbatim: "Your personal allowance goes down by £1 for every £2 that your adjusted
# net income is above £100,000. This means your allowance is zero if your income is
# £125,140 or above."
# The boundary and ceiling values are directly HMRC-published. Intermediate values
# (e.g. £7,570 at £110,000) are arithmetically derived from that stated rule.

examples:
  - description: "Below threshold (£80,000) → full PA £12,570"
    # HMRC: no taper below £100,000. Full PA = £12,570.
    # Source: https://www.gov.uk/income-tax-rates/personal-allowances
    source: "HMRC gov.uk/income-tax-rates/personal-allowances"
    inputs:
      adjusted_net_income: 80000
    expected: 12570

  - description: "At threshold (£100,000) → full PA £12,570"
    # HMRC: taper starts above £100,000. At exactly £100,000 the PA is still £12,570.
    # Source: https://www.gov.uk/income-tax-rates/personal-allowances
    source: "HMRC gov.uk/income-tax-rates/personal-allowances"
    inputs:
      adjusted_net_income: 100000
    expected: 12570

  - description: "£10,000 above threshold (£110,000) → PA £7,570"
    # Derivation: £12,570 − (£10,000 ÷ 2) = £12,570 − £5,000 = £7,570
    # Rule: £1 reduction per £2 excess above £100,000.
    # Source: https://www.gov.uk/income-tax-rates/personal-allowances
    source: "arithmetic from HMRC-stated taper rule"
    inputs:
      adjusted_net_income: 110000
    expected: 7570

  - description: "£20,000 above threshold (£120,000) → PA £2,570"
    # Derivation: £12,570 − (£20,000 ÷ 2) = £12,570 − £10,000 = £2,570
    # Source: https://www.gov.uk/income-tax-rates/personal-allowances
    source: "arithmetic from HMRC-stated taper rule"
    inputs:
      adjusted_net_income: 120000
    expected: 2570

  - description: "At taper ceiling (£125,140) → zero PA"
    # HMRC verbatim: "your allowance is zero if your income is £125,140 or above."
    # Source: https://www.gov.uk/income-tax-rates/personal-allowances
    source: "HMRC gov.uk/income-tax-rates/personal-allowances — verbatim ceiling stated"
    inputs:
      adjusted_net_income: 125140
    expected: 0

  - description: "Above taper ceiling (£130,000) → zero PA (floor at 0)"
    # HMRC: PA is zero for all income ≥ £125,140.
    # Source: https://www.gov.uk/income-tax-rates/personal-allowances
    source: "HMRC gov.uk/income-tax-rates/personal-allowances"
    inputs:
      adjusted_net_income: 130000
    expected: 0
