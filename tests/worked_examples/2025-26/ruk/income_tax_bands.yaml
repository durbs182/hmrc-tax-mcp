# Provenance: examples arithmetically derived from HMRC-published 2025-26 band thresholds
# and rates (20%, 40%, 45%). The band boundaries (£12,570, £50,270, £125,140) and rates are
# authoritative from:
#   https://www.gov.uk/income-tax-rates/personal-allowances
#   https://www.gov.uk/government/publications/rates-and-allowances-income-tax/income-tax-rates-and-allowances-current-and-past
# No HMRC helpsheet publishes a standalone computed income-tax-bands worked example;
# the arithmetic has been independently verified by hand.

examples:
  - description: "Basic-rate taxpayer £30,000 taxable income → £3,486 tax"
    # Derivation: 20% × (£30,000 − £12,570) = 20% × £17,430 = £3,486
    # Rates source: https://www.gov.uk/income-tax-rates/personal-allowances
    source: "arithmetic from HMRC 2025-26 published rates"
    inputs:
      taxable_income: 30000
    expected: 3486

  - description: "Higher-rate taxpayer £60,000 taxable income → £11,432 tax"
    # Derivation: 20% × (£50,270−£12,570) + 40% × (£60,000−£50,270)
    #           = 20% × £37,700 + 40% × £9,730
    #           = £7,540 + £3,892 = £11,432
    # Rates source: https://www.gov.uk/income-tax-rates/personal-allowances
    source: "arithmetic from HMRC 2025-26 published rates"
    inputs:
      taxable_income: 60000
    expected: 11432

  - description: "Additional-rate taxpayer £150,000 taxable income → £48,675 tax"
    # Derivation: 20% × £37,700 + 40% × (£125,140−£50,270) + 45% × (£150,000−£125,140)
    #           = £7,540 + 40% × £74,870 + 45% × £24,860
    #           = £7,540 + £29,948 + £11,187 = £48,675
    # Rates source: https://www.gov.uk/income-tax-rates/personal-allowances
    source: "arithmetic from HMRC 2025-26 published rates"
    inputs:
      taxable_income: 150000
    expected: 48675

  - description: "Zero income → zero tax"
    source: "arithmetic from HMRC 2025-26 published rates"
    inputs:
      taxable_income: 0
    expected: 0

  - description: "Nil band limit (£12,570) → zero tax"
    # HMRC: 0% rate applies up to and including £12,570 (the Personal Allowance threshold).
    # Rates source: https://www.gov.uk/income-tax-rates/personal-allowances
    source: "arithmetic from HMRC 2025-26 published rates"
    inputs:
      taxable_income: 12570
    expected: 0

  - description: "Basic/higher boundary (£50,270) → £7,540"
    # Derivation: 20% × (£50,270 − £12,570) = 20% × £37,700 = £7,540
    # HMRC confirms the basic-rate band upper threshold is £50,270.
    # Rates source: https://www.gov.uk/income-tax-rates/personal-allowances
    source: "arithmetic from HMRC 2025-26 published rates"
    inputs:
      taxable_income: 50270
    expected: 7540
