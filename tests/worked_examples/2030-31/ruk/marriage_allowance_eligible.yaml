# Eligibility for Marriage Allowance:
#   1. Transferor's income must be at or below the Personal Allowance (£12,570)
#   2. Recipient must NOT be a higher-rate or additional-rate taxpayer
# Both parties must be married or in a civil partnership.
# Source: https://www.gov.uk/marriage-allowance/eligibility
examples:
  - description: "Both conditions met — eligible (transferor £10,000 income, recipient basic rate)"
    source: "HMRC Marriage Allowance eligibility"
    inputs:
      transferor_income: 10000
      recipient_is_higher_rate: false
    expected: true

  - description: "Transferor income above PA (£13,000) — not eligible"
    source: "HMRC Marriage Allowance — transferor income condition"
    inputs:
      transferor_income: 13000
      recipient_is_higher_rate: false
    expected: false

  - description: "Recipient is higher-rate taxpayer — not eligible"
    source: "HMRC Marriage Allowance — recipient rate condition"
    inputs:
      transferor_income: 10000
      recipient_is_higher_rate: true
    expected: false

  - description: "Transferor income exactly at PA (£12,570) — eligible"
    source: "HMRC Marriage Allowance — boundary: income <= PA"
    inputs:
      transferor_income: 12570
      recipient_is_higher_rate: false
    expected: true
