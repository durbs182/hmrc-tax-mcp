# Provenance: thresholds frozen at 2021-22 levels under the income tax threshold freeze.
# Source: gov.uk/government/publications/maintaining-income-tax-and-equivalent-national-insurance-contributions-thresholds-until-5-april-2031
# Rates (20%, 40%, 45%) and band boundaries (£12,570, £50,270, £125,140) are unchanged.
# Examples are arithmetically derived from these frozen thresholds.

examples:
  - description: "Basic-rate taxpayer £30,000 taxable income → £3,486 tax"
    # 20% × (£30,000 − £12,570) = 20% × £17,430 = £3,486
    source: "arithmetic from frozen 2029-30 thresholds — gov.uk/government/publications/maintaining-income-tax-and-equivalent-national-insurance-contributions-thresholds-until-5-april-2031"
    inputs:
      taxable_income: 30000
    expected: 3486

  - description: "Higher-rate taxpayer £60,000 taxable income → £11,432 tax"
    # 20% × £37,700 + 40% × £9,730 = £7,540 + £3,892 = £11,432
    source: "arithmetic from frozen 2029-30 thresholds — gov.uk/government/publications/maintaining-income-tax-and-equivalent-national-insurance-contributions-thresholds-until-5-april-2031"
    inputs:
      taxable_income: 60000
    expected: 11432

  - description: "Additional-rate taxpayer £150,000 taxable income → £48,675 tax"
    # 20% × £37,700 + 40% × £74,870 + 45% × £24,860 = £7,540 + £29,948 + £11,187 = £48,675
    source: "arithmetic from frozen 2029-30 thresholds — gov.uk/government/publications/maintaining-income-tax-and-equivalent-national-insurance-contributions-thresholds-until-5-april-2031"
    inputs:
      taxable_income: 150000
    expected: 48675

  - description: "Zero income → zero tax"
    source: "arithmetic from frozen 2029-30 thresholds"
    inputs:
      taxable_income: 0
    expected: 0

  - description: "Personal allowance ceiling (£12,570) → zero tax"
    source: "arithmetic from frozen 2029-30 thresholds"
    inputs:
      taxable_income: 12570
    expected: 0

  - description: "Basic/higher boundary (£50,270) → £7,540"
    # 20% × (£50,270 − £12,570) = 20% × £37,700 = £7,540
    source: "arithmetic from frozen 2029-30 thresholds"
    inputs:
      taxable_income: 50270
    expected: 7540
