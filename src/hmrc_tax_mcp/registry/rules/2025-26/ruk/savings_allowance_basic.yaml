rule_id: savings_allowance_basic
version: "1.0.0"
tax_year: "2025-26"
jurisdiction: rUK
title: Personal Savings Allowance – Basic Rate (rUK 2025-26)
description: >
  Basic-rate taxpayers can earn up to £1,000 of savings interest tax-free
  per year under the Personal Savings Allowance (PSA). Higher-rate taxpayers
  get £500; additional-rate taxpayers get nil. This rule returns the PSA for
  basic-rate taxpayers.
