title: ISA Income Tax Due — Zero (rUK 2025-26)
description: 'Returns zero — confirming that income (interest, dividends, rental income) arising within an Individual Savings
  Account (ISA) is entirely exempt from UK income tax. This rule is used in composite tax calculations to exclude ISA income
  from the taxable income base. Interest from a cash ISA, dividends from an S&S ISA, and any other income within the ISA wrapper
  is not reported on a tax return and does not count toward personal allowance tapering or higher-rate thresholds. Applies
  UK-wide. No inputs required.

  '
