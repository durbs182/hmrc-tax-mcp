title: Full New State Pension (Annual, rUK 2025-26)
description: >
  The full new State Pension for 2025-26 is £230.25 per week (after the
  4.1% triple-lock increase applied from April 2025), equating to £11,973.00
  per year (52 weeks). Returns the annual amount. Individuals with incomplete
  NI records receive a proportional amount.
