rule_id: pa_taper
version: "1.0.0"
tax_year: "2025-26"
jurisdiction: rUK
title: Personal Allowance Taper (rUK 2025-26)
description: >
  Tapers the personal allowance (£12,570) for high earners. For every £2 of
  adjusted net income above £100,000 the personal allowance is reduced by £1.
  The allowance reaches zero at £125,140. Input variable `adjusted_net_income`
  is the individual's adjusted net income as defined in ITTOIA 2005 s.58.
dsl_source: |
  taper adjusted_net_income:
    threshold 100000
    ratio 1 per 2
    base 12570
ast:
  node: TAPER
  args:
    - node: VAR
      name: adjusted_net_income
  threshold:
    node: CONST
    value: 100000
  ratio:
    node: CONST
    value: 0.5
  base:
    node: CONST
    value: 12570
