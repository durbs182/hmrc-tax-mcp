rule_id: pension_estate_inclusion_2027
version: "1.0.0"
tax_year: "2025-26"
jurisdiction: "rUK"
title: "Pension Estate Inclusion from April 2027"
description: >
  From 6 April 2027, uncrystallised pension funds and drawdown funds remaining on death will be included in the member's IHT estate. Returns the pension fund value to be added to the taxable estate when is_2027_or_later is true; returns zero for earlier tax years.
dsl_source: |
  return if is_2027_or_later then pension_pot_value else 0
