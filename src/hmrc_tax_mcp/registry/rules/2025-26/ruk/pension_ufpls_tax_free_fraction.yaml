rule_id: pension_ufpls_tax_free_fraction
version: "1.0.0"
tax_year: "2025-26"
jurisdiction: rUK
title: Pension UFPLS Tax-Free Fraction (rUK 2025-26)
description: >
  For an Uncrystallised Funds Pension Lump Sum (UFPLS), 25% of each payment
  is tax-free (up to the Lump Sum Allowance remaining). This rule returns the
  tax-free fraction as a decimal (0.25). Multiply by the UFPLS amount to obtain
  the tax-free portion.
