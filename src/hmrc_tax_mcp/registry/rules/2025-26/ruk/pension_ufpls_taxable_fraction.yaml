rule_id: pension_ufpls_taxable_fraction
version: "1.0.0"
tax_year: "2025-26"
jurisdiction: rUK
title: Pension UFPLS Taxable Fraction (rUK 2025-26)
description: >
  For an Uncrystallised Funds Pension Lump Sum (UFPLS), 75% of each payment
  is taxable as pension income. This rule returns the taxable fraction as a
  decimal (0.75). Multiply by the UFPLS amount to obtain the taxable portion.
