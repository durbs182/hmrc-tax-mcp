rule_id: income_tax_due
version: "1.0.0"
tax_year: "2025-26"
jurisdiction: rUK
title: Income Tax Due – Composite (rUK 2025-26)
description: >
  Calculates the total income tax liability for a given adjusted net income,
  combining the personal allowance taper and the three rate bands in a single
  rule. The personal allowance (£12,570) tapers by £1 per £2 above £100,000,
  reaching £0 at £125,140. Bands: 20% (basic, up to £50,270), 40% (higher,
  £50,270–£125,140), 45% (additional, above £125,140). Input variable
  `adjusted_net_income` is gross taxable income before the personal allowance.
dsl_source: |
  let effective_pa = taper adjusted_net_income:
    threshold 100000
    ratio 1 per 2
    base 12570
  let income_above_pa = max(adjusted_net_income - effective_pa, 0)
  let basic_band = min(income_above_pa, 50270 - effective_pa)
  let higher_band = max(min(adjusted_net_income, 125140) - 50270, 0)
  let additional_band = max(adjusted_net_income - 125140, 0)
  return round(basic_band * 0.20 + higher_band * 0.40 + additional_band * 0.45, 2)
ast:
  node: LET
  bindings:
    - - effective_pa
      - node: TAPER
        args:
          - node: VAR
            name: adjusted_net_income
        threshold:
          node: CONST
          value: 100000
        ratio:
          node: CONST
          value: 0.5
        base:
          node: CONST
          value: 12570
    - - income_above_pa
      - node: CALL
        name: max
        args:
          - node: SUB
            args:
              - node: VAR
                name: adjusted_net_income
              - node: VAR
                name: effective_pa
          - node: CONST
            value: 0
    - - basic_band
      - node: CALL
        name: min
        args:
          - node: VAR
            name: income_above_pa
          - node: SUB
            args:
              - node: CONST
                value: 50270
              - node: VAR
                name: effective_pa
    - - higher_band
      - node: CALL
        name: max
        args:
          - node: SUB
            args:
              - node: CALL
                name: min
                args:
                  - node: VAR
                    name: adjusted_net_income
                  - node: CONST
                    value: 125140
              - node: CONST
                value: 50270
          - node: CONST
            value: 0
    - - additional_band
      - node: CALL
        name: max
        args:
          - node: SUB
            args:
              - node: VAR
                name: adjusted_net_income
              - node: CONST
                value: 125140
          - node: CONST
            value: 0
  body:
    node: CALL
    name: round
    args:
      - node: ADD
        args:
          - node: ADD
            args:
              - node: MUL
                args:
                  - node: VAR
                    name: basic_band
                  - node: CONST
                    value: 0.2
              - node: MUL
                args:
                  - node: VAR
                    name: higher_band
                  - node: CONST
                    value: 0.4
          - node: MUL
            args:
              - node: VAR
                name: additional_band
              - node: CONST
                value: 0.45
      - node: CONST
        value: 2
