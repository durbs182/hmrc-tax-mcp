title: Capital Gains Tax Annual Exempt Amount (rUK 2025-26)
description: >
  The annual exempt amount for Capital Gains Tax in 2025-26 is £3,000.
  Gains up to this amount are exempt from CGT. This rule returns the
  exempt amount as a constant.
