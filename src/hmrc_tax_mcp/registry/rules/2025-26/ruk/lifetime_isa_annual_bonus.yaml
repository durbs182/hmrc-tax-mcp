rule_id: lifetime_isa_annual_bonus
version: 1.0.0
tax_year: 2025-26
jurisdiction: rUK
title: Lifetime ISA Government Bonus (rUK 2025-26)
description: 'Computes the 25% government bonus on Lifetime ISA (LISA) contributions for a tax year. The bonus is 25% of the
  amount contributed, capped at a maximum contribution of £4,000, giving a maximum annual bonus of £1,000. The LISA must be
  held until age 60 (or used for a first home purchase) to avoid a withdrawal penalty. Input variable: `contributions` — total
  LISA contributions in the tax year. Returns bonus in pounds.

  '
dsl_source: '  return round(min(contributions, 4000) * 0.25, 2)

  '
ast:
  node: CALL
  name: round
  args:
  - node: MUL
    args:
    - node: CALL
      name: min
      args:
      - node: VAR
        name: contributions
      - node: CONST
        value: 4000
    - node: CONST
      value: 0.25
  - node: CONST
    value: 2
