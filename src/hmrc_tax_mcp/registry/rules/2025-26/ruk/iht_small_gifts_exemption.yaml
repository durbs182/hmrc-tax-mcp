title: IHT Small Gifts Exemption — Per-Recipient Limit (rUK 2025-26)
description: 'Returns the per-recipient IHT small gifts exemption limit (£250 per person per year). You can give up to £250
  to as many different people as you like each tax year, completely free of IHT. This exemption cannot be combined with the
  annual gift exemption for the same recipient. No input variables required. Returns the per-recipient limit in pounds.

  '
