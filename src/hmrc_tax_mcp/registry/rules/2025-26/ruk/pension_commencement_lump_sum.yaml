rule_id: pension_commencement_lump_sum
version: 1.0.0
tax_year: 2025-26
jurisdiction: rUK
title: Pension Commencement Lump Sum – PCLS (rUK 2025-26)
description: 'Computes the Pension Commencement Lump Sum (PCLS) — the tax-free cash entitlement on crystallisation of pension
  benefits. The PCLS is 25% of the amount being crystallised, subject to an overall lifetime cap of the remaining Lump Sum
  Allowance (LSA). The LSA is £268,275 (25% of the former Lifetime Allowance of £1,073,100, fixed by Finance Act 2024). Once
  the LSA is exhausted, no further PCLS can be paid tax-free; any excess is a Pension Commencement Excess Lump Sum (PCELS)
  and is taxed at the marginal rate. Input variables: `crystallised_amount` — the pension fund amount being crystallised;
  `lsa_remaining` — the remaining LSA (use pension_lsa_remaining to compute this). Returns the PCLS amount in pounds, rounded
  to 2 decimal places.

  '
dsl_source: '  return round(min(crystallised_amount * 0.25, lsa_remaining), 2)

  '
ast:
  node: CALL
  name: round
  args:
  - node: CALL
    name: min
    args:
    - node: MUL
      args:
      - node: VAR
        name: crystallised_amount
      - node: CONST
        value: 0.25
    - node: VAR
      name: lsa_remaining
  - node: CONST
    value: 2
