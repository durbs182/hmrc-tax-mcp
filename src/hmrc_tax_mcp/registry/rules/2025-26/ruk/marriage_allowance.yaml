title: Marriage Allowance Tax Credit (rUK 2025-26)
description: 'Returns the Marriage Allowance tax credit of £252 — the reduction in income tax liability for the recipient
  spouse or civil partner. The Marriage Allowance allows a non-taxpayer (or basic-rate taxpayer with income below the Personal
  Allowance) to transfer £1,260 of their unused Personal Allowance to their spouse or civil partner. The recipient receives
  a tax credit equal to £1,260 × 20% (basic rate) = £252, reducing their income tax bill. The £1,260 transfer amount is 10%
  of the standard Personal Allowance (£12,570), rounded up. Both the PA and the transfer amount are frozen to at least 2028.
  This rule returns the tax credit amount (£252). Use marriage_allowance_eligible to confirm eligibility before applying this
  credit. Cannot be claimed if the recipient is a higher- or additional-rate taxpayer. Can be backdated up to 4 tax years.

  '
