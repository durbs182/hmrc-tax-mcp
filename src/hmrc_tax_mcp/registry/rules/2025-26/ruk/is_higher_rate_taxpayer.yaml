rule_id: is_higher_rate_taxpayer
version: "1.0.0"
tax_year: "2025-26"
jurisdiction: rUK
title: Higher-Rate Taxpayer Test (rUK 2025-26)
description: >
  Returns true if the individual's adjusted net income exceeds the higher-rate
  threshold of £50,270 for 2025-26. Used to determine which CGT rate applies
  (18% basic / 24% higher) and which Personal Savings Allowance tier applies.
  Input variable `adjusted_net_income` is gross income before the personal
  allowance deduction (as used in ITTOIA 2005 s.58).
dsl_source: |
  return adjusted_net_income > 50270
ast:
  node: GT
  args:
    - node: VAR
      name: adjusted_net_income
    - node: CONST
      value: 50270
