rule_id: pension_lsa_remaining
version: 1.0.0
tax_year: 2025-26
jurisdiction: rUK
title: Pension Lump Sum Allowance — Remaining (rUK 2025-26)
description: 'Computes the remaining Pension Lump Sum Allowance (LSA) available for future tax-free pension lump sums. The
  LSA is £268,275 (Finance Act 2024), representing 25% of the former Lifetime Allowance of £1,073,100. This rule subtracts
  all previously taken tax-free pension lump sums from the LSA, flooring at zero. The result is used as the `lsa_remaining`
  input to pension_commencement_lump_sum. Input: `prior_tax_free_cash` — total tax-free pension cash received across all crystallisation
  events to date (in pounds). Returns the remaining LSA in pounds.

  '
dsl_source: '  return max(268275 - prior_tax_free_cash, 0)

  '
ast:
  node: CALL
  name: max
  args:
  - node: SUB
    args:
    - node: CONST
      value: 268275
    - node: VAR
      name: prior_tax_free_cash
  - node: CONST
    value: 0
