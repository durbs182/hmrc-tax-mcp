rule_id: lbtt_residential
version: "1.0.0"
tax_year: "2025-26"
jurisdiction: "scotland"
title: "Land and Buildings Transaction Tax — Residential"
description: >
  LBTT is the Scottish equivalent of SDLT for residential property purchases. Bands (2025-26): 0% up to £145,000; 2% on £145,001-£250,000; 5% on £250,001-£325,000; 10% on £325,001-£750,000; 12% above £750,000. Administered by Revenue Scotland.
dsl_source: |
  let band1 = if purchase_price > 145000 then min(purchase_price, 250000) - 145000 else 0
  let band2 = if purchase_price > 250000 then min(purchase_price, 325000) - 250000 else 0
  let band3 = if purchase_price > 325000 then min(purchase_price, 750000) - 325000 else 0
  let band4 = if purchase_price > 750000 then purchase_price - 750000 else 0
  return round(band1 * 0.02 + band2 * 0.05 + band3 * 0.10 + band4 * 0.12, 2)
