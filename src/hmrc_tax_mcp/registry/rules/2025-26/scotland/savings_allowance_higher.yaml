tax_year: "2025-26"
jurisdiction: scotland
title: Savings Allowance — Higher/Intermediate/Advanced Rate (Scotland 2025-26)
description: >
  Annual tax-free savings allowance for Scottish taxpayers who pay at the intermediate
  (21%), higher (42%), advanced (45%) or top (48%) rates. All such taxpayers receive
  £500 under UK-wide personal savings allowance rules. Savings income uses UK rates
  regardless of Scottish taxpayer status.
