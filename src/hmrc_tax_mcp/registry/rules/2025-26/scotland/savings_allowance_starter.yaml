rule_id: savings_allowance_starter
version: "1.0.0"
tax_year: "2025-26"
jurisdiction: scotland
title: Savings Allowance — Starter Rate (Scotland 2025-26)
description: >
  Annual tax-free savings allowance for Scottish starter-rate taxpayers (those whose
  non-savings income falls in the 19% starter band). Starter-rate taxpayers receive
  the same £1,000 allowance as basic-rate taxpayers under UK-wide rules. Savings income
  uses UK rates regardless of Scottish taxpayer status.
