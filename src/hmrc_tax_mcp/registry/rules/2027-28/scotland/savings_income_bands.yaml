rule_id: savings_income_bands
version: 1.0.0
tax_year: 2027-28
jurisdiction: scotland
title: Savings Income Bands (Scotland 2027-28)
description: 'The Personal Savings Allowance is applied as a 0% savings band that still consumes band space: £1,000 for basic-rate
  taxpayers, £500 for higher-rate, £0 for additional-rate. PSA tiering is determined from total income including savings (income_before
  + savings_income), not from income_before alone — so savings income that pushes the taxpayer into a higher rate band correctly
  reduces the PSA. Savings income rates are set at UK level and apply in Scotland as well as rUK. Input variables: `savings_income`
  (gross savings interest) and `income_before` (gross income from prior streams — employment, property — for band stacking
  before savings income). Thresholds frozen at 2021-22.

  '
dsl_source: "  let total_income = income_before + savings_income\n  let psa = if total_income > 125140 then 0 else if total_income\
  \ > 50270 then 500 else 1000\n  let psa_band = min(savings_income, psa)\n  let start = income_before + psa_band\n  let end\
  \ = income_before + savings_income\n  let basic_portion = max(min(end, 50270) - max(start, 12570), 0)\n  let higher_portion\
  \ = max(min(end, 125140) - max(start, 50270), 0)\n  let additional_portion = max(end - max(start, 125140), 0)\n  return\
  \ round(basic_portion * 0.22 + higher_portion * 0.42 + additional_portion * 0.47, 2)\n"
