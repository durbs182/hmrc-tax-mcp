rule_id: dividend_income_bands
version: "1.0.0"
tax_year: "2027-28"
jurisdiction: scotland
title: Dividend Income Bands (Scotland 2027-28)
description: >
  Calculates income tax due on dividend income for 2027-28. Applies the £500 dividend
  allowance (tax-free) then taxes the remainder at: 10.75% ordinary (basic-rate band),
  35.75% upper (higher-rate band), or 39.35% additional rate. Rates unchanged from
  2026-27 (Finance Bill 2025-26). Savings and dividend income rates are set at UK level
  and apply in Scotland as well as rUK. Input variables: `dividend_income` (gross
  dividend income before the allowance) and `income_before` (gross income from all
  prior income streams for band positioning). Thresholds frozen at 2021-22 levels.
dsl_source: |
  let dividend_taxable = max(dividend_income - 500, 0)
  let start = income_before
  let end = income_before + dividend_taxable
  let basic_portion = max(min(end, 50270) - max(start, 12570), 0)
  let upper_portion = max(min(end, 125140) - max(start, 50270), 0)
  let additional_portion = max(end - max(start, 125140), 0)
  return round(basic_portion * 0.1075 + upper_portion * 0.3575 + additional_portion * 0.3935, 2)
ast:
  node: LET
  bindings:
  - - dividend_taxable
    - node: CALL
      name: max
      args:
      - node: SUB
        args:
        - node: VAR
          name: dividend_income
        - node: CONST
          value: 500
      - node: CONST
        value: 0
  - - start
    - node: VAR
      name: income_before
  - - end
    - node: ADD
      args:
      - node: VAR
        name: income_before
      - node: VAR
        name: dividend_taxable
  - - basic_portion
    - node: CALL
      name: max
      args:
      - node: SUB
        args:
        - node: CALL
          name: min
          args:
          - node: VAR
            name: end
          - node: CONST
            value: 50270
        - node: CALL
          name: max
          args:
          - node: VAR
            name: start
          - node: CONST
            value: 12570
      - node: CONST
        value: 0
  - - upper_portion
    - node: CALL
      name: max
      args:
      - node: SUB
        args:
        - node: CALL
          name: min
          args:
          - node: VAR
            name: end
          - node: CONST
            value: 125140
        - node: CALL
          name: max
          args:
          - node: VAR
            name: start
          - node: CONST
            value: 50270
      - node: CONST
        value: 0
  - - additional_portion
    - node: CALL
      name: max
      args:
      - node: SUB
        args:
        - node: VAR
          name: end
        - node: CALL
          name: max
          args:
          - node: VAR
            name: start
          - node: CONST
            value: 125140
      - node: CONST
        value: 0
  body:
    node: CALL
    name: round
    args:
    - node: ADD
      args:
      - node: ADD
        args:
        - node: MUL
          args:
          - node: VAR
            name: basic_portion
          - node: CONST
            value: 0.1075
        - node: MUL
          args:
          - node: VAR
            name: upper_portion
          - node: CONST
            value: 0.3575
      - node: MUL
        args:
        - node: VAR
          name: additional_portion
        - node: CONST
          value: 0.3935
    - node: CONST
      value: 2
