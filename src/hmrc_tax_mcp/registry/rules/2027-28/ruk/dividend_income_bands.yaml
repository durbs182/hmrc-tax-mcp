  body:
    node: CALL
    name: round
    args:
    - node: ADD
      args:
      - node: ADD
        args:
        - node: MUL
          args:
          - node: VAR
            name: basic_portion
          - node: CONST
            value: 0.1075
        - node: MUL
          args:
          - node: VAR
            name: upper_portion
          - node: CONST
            value: 0.3575
      - node: MUL
