rule_id: dividend_income_bands
version: 1.0.0
tax_year: 2027-28
jurisdiction: rUK
title: Dividend Income Bands (rUK 2027-28)
description: 'Calculates income tax due on dividend income for 2027-28. Applies the £500 dividend allowance (tax-free) then
  taxes the remainder at: 10.75% ordinary (basic-rate band), 35.75% upper (higher-rate band), or 39.35% additional rate. Rates
  unchanged from 2026-27 (Finance Bill 2025-26). Savings and dividend income rates are set at UK level and apply in Scotland
  as well as rUK. Input variables: `dividend_income` (gross dividend income before the allowance) and `income_before` (gross
  income from all prior income streams for band positioning). Thresholds frozen at 2021-22 levels.

  '
dsl_source: "  let div_allowance = min(dividend_income, 500)\n  let start = income_before + div_allowance\n  let end = income_before\
  \ + dividend_income\n  let basic_portion = max(min(end, 50270) - max(start, 12570), 0)\n  let upper_portion = max(min(end,\
  \ 125140) - max(start, 50270), 0)\n  let additional_portion = max(end - max(start, 125140), 0)\n  return round(basic_portion\
  \ * 0.1075 + upper_portion * 0.3575 + additional_portion * 0.3935, 2)\n"
