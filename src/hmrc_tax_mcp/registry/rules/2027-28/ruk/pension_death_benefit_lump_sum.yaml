rule_id: pension_death_benefit_lump_sum
version: "1.0.0"
tax_year: "2027-28"
jurisdiction: "rUK"
title: "Pension Death Benefit Lump Sum Tax"
description: >
  Tax on a lump-sum death benefit paid from a pension. If the member died before age 75, the lump sum is tax-free up to the remaining Lump Sum and Death Benefit Allowance (LSDBA); excess is taxed at the recipient's marginal rate. If the member was 75 or over, the full amount is taxed at the recipient's marginal rate.
dsl_source: |
  let taxable = if age_at_death >= 75 then lump_sum_amount else if lump_sum_amount > lsa_remaining then lump_sum_amount - lsa_remaining else 0
  return round(taxable * marginal_rate, 2)
