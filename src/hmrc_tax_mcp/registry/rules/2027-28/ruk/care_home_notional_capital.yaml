rule_id: care_home_notional_capital
version: "1.0.0"
tax_year: "2027-28"
jurisdiction: "rUK"
title: "Care Home Notional Capital — Deprivation of Assets"
description: >
  Where a local authority determines that an individual has deliberately deprived themselves of capital to avoid care funding, the disposed asset is treated as notional capital and added to actual capital for means-testing purposes. Returns the total capital assessed (actual + notional) for comparison against the relevant care-home capital threshold.
dsl_source: |
  return round(actual_capital + notional_capital, 2)
