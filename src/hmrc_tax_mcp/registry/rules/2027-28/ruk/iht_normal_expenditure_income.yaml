rule_id: iht_normal_expenditure_income
version: 1.0.0
tax_year: 2027-28
jurisdiction: rUK
title: IHT Normal Expenditure Out of Income Exemption (rUK 2027-28)
description: 'Returns true if a gift qualifies as exempt under the ''normal expenditure out of income'' exemption. To qualify,
  the gift must: (1) form part of a habitual pattern of giving — not a one-off; (2) be paid from income (not capital); and
  (3) leave the donor with sufficient income to maintain their normal standard of living. All three conditions must be satisfied.
  There is no upper limit on gifts qualifying under this exemption if all conditions are met. Input variables: `is_habitual`
  — boolean, gifts form part of an established pattern; `paid_from_income` — boolean, gift comes from income not capital;
  `leaves_adequate_living_standard` — boolean, donor retains enough income for their lifestyle. Returns true if the gift is
  immediately IHT-exempt.

  '
dsl_source: '  return is_habitual and paid_from_income and leaves_adequate_living_standard

  '
