rule_id: pension_annual_allowance_effective
version: 1.0.0
tax_year: 2027-28
jurisdiction: rUK
title: Effective Pension Annual Allowance — Standard / Tapered / MPAA (rUK 2027-28)
description: 'Returns the lowest applicable Annual Allowance given the member''s circumstances: the standard AA, the tapered
  AA (if threshold income > £200,000), or the Money Purchase Annual Allowance (if MPAA has been triggered). Caller should
  supply the correct pre-computed values from `pension_tapered_annual_allowance` and `money_purchase_annual_allowance`. Input
  variables: `standard_annual_allowance` — standard AA (£60,000); `tapered_annual_allowance` — tapered AA (£10,000-£60,000);
  `mpaa_limit` — MPAA (£10,000 if triggered, else supply £60,000). Returns the effective AA in pounds.

  '
dsl_source: '  return min(standard_annual_allowance, min(tapered_annual_allowance, mpaa_limit))

  '
