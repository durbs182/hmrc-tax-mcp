rule_id: iht_taper_relief
version: 1.0.0
tax_year: 2027-28
jurisdiction: rUK
title: IHT Taper Relief Percentage on Gifts (rUK 2027-28)
description: 'Returns the taper relief percentage reduction applied to IHT on gifts made between 3 and 7 years before death.
  Gifts made within 3 years attract no relief (0%). Between 3-4 years: 20% reduction. 4-5 years: 40% reduction. 5-6 years:
  60% reduction. 6-7 years: 80% reduction. Gifts surviving 7+ years are fully exempt (100% reduction — effectively PET becomes
  IHT-free). Note: taper relief reduces the IHT due on the excess above the nil-rate band — it does not reduce the transfer
  value. Input variable: `years_since_gift` — complete years elapsed since the gift was made. Returns the relief percentage
  (0, 20, 40, 60, 80, or 100).

  '
dsl_source: '  return if years_since_gift >= 7 then 100 else if years_since_gift >= 6 then 80 else if years_since_gift >=
  5 then 60 else if years_since_gift >= 4 then 40 else if years_since_gift >= 3 then 20 else 0

  '
ast:
  node: IF
  cond:
    node: GTE
    args:
    - node: VAR
      name: years_since_gift
    - node: CONST
      value: 7
  then:
    node: CONST
    value: 100
  else:
    node: IF
    cond:
      node: GTE
      args:
      - node: VAR
        name: years_since_gift
      - node: CONST
        value: 6
    then:
      node: CONST
      value: 80
    else:
      node: IF
      cond:
        node: GTE
        args:
        - node: VAR
          name: years_since_gift
        - node: CONST
          value: 5
      then:
        node: CONST
        value: 60
      else:
        node: IF
        cond:
          node: GTE
          args:
          - node: VAR
            name: years_since_gift
          - node: CONST
            value: 4
        then:
          node: CONST
          value: 40
        else:
          node: IF
          cond:
            node: GTE
            args:
            - node: VAR
              name: years_since_gift
            - node: CONST
              value: 3
          then:
            node: CONST
            value: 20
          else:
            node: CONST
            value: 0
