rule_id: prr_letting_relief
version: 1.0.0
tax_year: 2027-28
jurisdiction: rUK
title: Letting Relief — PRR Extension for Let Periods (rUK 2027-28)
description: 'Computes the Letting Relief available on a capital gain where a former main residence was let out. From 6 April
  2020, Letting Relief is only available when the owner was in shared occupation of the property with the tenant at the time
  of letting. When the shared-occupancy condition is met, the relief is capped at the LOWER of: (1) the PRR amount already
  given (prr_amount); (2) the gain directly attributable to the letting period (letting_gain); (3) the statutory maximum of
  £40,000. Input variables: `prr_amount` — PRR relief already computed (from private_residence_relief); `letting_gain` — the
  portion of the total gain that arises from letting periods; `shared_occupancy` — boolean, true if the owner lived alongside
  the tenant. Returns letting relief in pounds (0 if shared_occupancy is false), rounded to 2dp. Letting Relief is applied
  after PRR to reduce the remaining chargeable gain.

  '
dsl_source: '  return if shared_occupancy then round(min(prr_amount, min(letting_gain, 40000)), 2) else 0

  '
ast:
  node: IF
  cond:
    node: VAR
    name: shared_occupancy
  then:
    node: CALL
    name: round
    args:
    - node: CALL
      name: min
      args:
      - node: VAR
        name: prr_amount
      - node: CALL
        name: min
        args:
        - node: VAR
          name: letting_gain
        - node: CONST
          value: 40000
    - node: CONST
      value: 2
  else:
    node: CONST
    value: 0
