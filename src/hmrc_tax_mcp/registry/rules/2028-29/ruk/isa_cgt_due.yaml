title: ISA Capital Gains Tax Due — Zero (rUK 2028-29)
description: 'Returns zero — confirming that capital gains realised within an Individual Savings Account (ISA) are entirely
  exempt from UK Capital Gains Tax (CGT). Gains on investments held inside an ISA (stocks, funds, bonds) are not reported
  to HMRC and do not use the annual CGT exempt amount. This rule is used in composite portfolio tax calculations to exclude
  ISA gains from the CGT computation. There is no limit on the gain size that can be sheltered. Applies UK-wide. No inputs
  required.

  '
