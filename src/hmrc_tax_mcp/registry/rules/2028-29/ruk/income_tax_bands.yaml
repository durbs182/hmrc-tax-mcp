rule_id: income_tax_bands
version: "1.0.0"
tax_year: "2028-29"
jurisdiction: rUK
title: Income Tax Bands (rUK 2028-29)
description: >
  Applies the 2028-29 rUK income tax bands to gross employment, trading and pension
  income. From 6 April 2027, property income and savings income are taxed at
  separate rates (see property_income_bands and savings_income_bands); this rule
  covers only non-property, non-savings, non-dividend income. All thresholds are
  frozen at 2021-22 levels under the threshold freeze legislated to run until
  5 April 2031. Input variable `taxable_income` is gross income (the personal
  allowance is embedded in the band start at £12,570).
dsl_source: |
  bands taxable_income:
    12570  to 50270  at 20%
    50270  to 125140 at 40%
    125140+           at 45%
ast:
  node: BAND_APPLY
  args:
    - node: VAR
      name: taxable_income
  bands:
    - lower: 12570
      upper: 50270
      rate: 0.2
    - lower: 50270
      upper: 125140
      rate: 0.4
    - lower: 125140
      upper: null
      rate: 0.45
