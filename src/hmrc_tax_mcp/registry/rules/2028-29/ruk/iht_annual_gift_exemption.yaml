rule_id: iht_annual_gift_exemption
version: 1.0.0
tax_year: 2028-29
jurisdiction: rUK
title: IHT Annual Gift Exemption (rUK 2028-29)
description: 'Returns the IHT Annual Gift Exemption available in the tax year. Each individual can give away up to £3,000
  per year free of IHT. If the exemption was not fully used in the previous tax year, the unused amount can be carried forward
  for one year only (maximum £6,000 combined). Once used, the prior-year carry-forward is lost; you cannot accumulate more
  than one year''s carry-forward. Input variable: `prior_year_unused` — boolean, true if the full £3,000 exemption was unused
  in the prior year. Returns the total exemption available in pounds (£3,000 or £6,000).

  '
dsl_source: '  return if prior_year_unused then 6000 else 3000

  '
ast:
  node: IF
  cond:
    node: VAR
    name: prior_year_unused
  then:
    node: CONST
    value: 6000
  else:
    node: CONST
    value: 3000
