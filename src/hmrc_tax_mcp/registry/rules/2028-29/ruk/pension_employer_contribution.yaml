rule_id: pension_employer_contribution
version: "1.0.0"
tax_year: "2028-29"
jurisdiction: "rUK"
title: "Pension Input Amount Including Employer Contribution"
description: >
  Employer pension contributions count toward the Annual Allowance and must be included in the pension input amount (PIA). Employer contributions are not taxed as a benefit in kind. Returns the total PIA as the sum of employee and employer contributions for comparison against the Annual Allowance.
dsl_source: |
  return round(employee_contribution + employer_contribution, 2)
