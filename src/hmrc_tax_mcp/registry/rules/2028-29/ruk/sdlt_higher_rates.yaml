rule_id: sdlt_higher_rates
version: 1.0.0
tax_year: 2028-29
jurisdiction: rUK
title: SDLT Higher Rates Surcharge — Additional Dwellings (rUK 2028-29)
description: 'Computes the SDLT Higher Rates surcharge for additional residential dwellings or purchases by non-UK residents.
  From 31 October 2024, the surcharge is 5% of the full purchase price (increased from 3% by Autumn Budget 2024). This amount
  is added to the standard `sdlt_residential` amount. Applies when purchasing an additional residential property (e.g. buy-to-let,
  second home) or when a non-UK resident individual purchases residential property in England or NI. Input variable: `purchase_price`
  — full property purchase price. Returns surcharge in pounds.

  '
dsl_source: '  return round(purchase_price * 0.05, 2)

  '
ast:
  node: CALL
  name: round
  args:
  - node: MUL
    args:
    - node: VAR
      name: purchase_price
    - node: CONST
      value: 0.05
  - node: CONST
    value: 2
