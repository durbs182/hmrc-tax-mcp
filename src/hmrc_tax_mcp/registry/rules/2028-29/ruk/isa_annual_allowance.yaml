rule_id: isa_annual_allowance
version: 1.0.0
tax_year: 2028-29
jurisdiction: rUK
title: ISA Annual Subscription Limit (rUK 2028-29)
description: 'Returns the maximum total amount that can be subscribed to Individual Savings Accounts (ISAs) in the tax year:
  £20,000. This limit applies across all ISA types held by the same individual (cash ISA, stocks and shares ISA, innovative
  finance ISA, and Lifetime ISA). The Lifetime ISA subscription is capped separately at £4,000/year (within the £20,000).
  Subscriptions above this limit are void and HMRC can recover the excess. The £20,000 limit has been unchanged since 2017-18
  and is confirmed frozen through 2030-31. All income and gains within an ISA are exempt from UK income tax and CGT. Applies
  UK-wide (ISA rules are HMRC-set, not devolved).

  '
