title: Inheritance Tax Residence Nil Rate Band (rUK 2028-29)
description: 'Returns the maximum Residence Nil Rate Band (RNRB) of £175,000 — the additional IHT threshold available when
  a qualifying residential property is left to direct descendants (children, grandchildren, step-children etc., including
  their spouses). The RNRB is applied in addition to the standard NRB (£325,000), giving a combined threshold of up to £500,000
  for individuals, or £1,000,000 for married couples or civil partners where both NRB and RNRB are transferred. The RNRB is
  limited to the lower of £175,000 and the net value of the qualifying residence. It is tapered by £1 for every £2 of estate
  value above £2,000,000 (see iht_rnrb_taper for the tapered amount). Unused RNRB can be transferred to a surviving spouse
  or civil partner. Frozen at £175,000 until at least 2030. UK-wide — IHT is not devolved. This rule returns the maximum unreduced
  RNRB; apply the taper separately for large estates.

  '
