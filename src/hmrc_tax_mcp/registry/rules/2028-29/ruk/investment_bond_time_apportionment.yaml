rule_id: investment_bond_time_apportionment
version: "1.0.0"
tax_year: "2028-29"
jurisdiction: "rUK"
title: "Investment Bond Time Apportionment Relief (Offshore Bonds)"
description: >
  Time apportionment relief reduces the chargeable gain on an offshore investment bond for periods when the policyholder was non-UK resident. The gain is multiplied by the ratio of UK-resident years to total years the bond was held.
dsl_source: |
  return round(if total_years > 0 then chargeable_gain * uk_years / total_years else 0, 2)
