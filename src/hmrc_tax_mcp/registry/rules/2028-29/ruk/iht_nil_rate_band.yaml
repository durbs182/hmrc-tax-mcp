title: Inheritance Tax Nil Rate Band (rUK 2028-29)
description: 'Returns the Inheritance Tax (IHT) Nil Rate Band (NRB) of £325,000 — the portion of the death estate on which
  no IHT is charged. Estates (after debts and reliefs) below the NRB pay no IHT. For amounts above, the standard rate is 40%
  (or 36% when ≥10% is left to charity). The NRB has been frozen at £325,000 since 2009-10 and is confirmed frozen until at
  least 2030 (Autumn Budget 2024). Any unused NRB can be transferred to a surviving spouse or civil partner (see iht_transferable_nil_rate_band).
  An additional Residence Nil Rate Band (RNRB) of up to £175,000 may also apply where a qualifying residence passes to direct
  descendants (see iht_residence_nil_rate_band). UK-wide — IHT is not devolved.

  '
