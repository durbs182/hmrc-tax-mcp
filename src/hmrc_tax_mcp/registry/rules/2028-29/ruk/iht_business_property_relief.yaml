tax_year: "2028-29"
jurisdiction: "rUK"
title: "IHT Business Property Relief"
description: >
  Business Property Relief (BPR) reduces the value of qualifying business assets for IHT purposes. 100% relief applies to unquoted trading company shares and sole trader or partnership interests. 50% relief applies to quoted minority shareholdings and land/buildings used by a partnership or controlled company. Pass the appropriate relief_rate (1.0 for 100%, 0.5 for 50%).
dsl_source: |
  return round(asset_value * relief_rate, 2)
