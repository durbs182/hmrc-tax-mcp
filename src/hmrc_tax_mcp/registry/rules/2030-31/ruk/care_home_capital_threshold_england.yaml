title: Care Home Capital Threshold — Upper Limit (England) (rUK 2030-31)
description: 'Returns the upper capital threshold for residential care in England (£23,250 for 2025-26). If a person''s capital
  (savings, property) exceeds this threshold, they must meet the full cost of their care. Between £14,250 and £23,250, local
  authority means-tested financial support is available on a sliding scale. Below £14,250, the lower threshold, capital is
  generally disregarded for means-testing. Note: These thresholds are set under the Care Act 2014 and may differ from social
  care charges set by councils. Returns the upper self-funding threshold in pounds.

  '
