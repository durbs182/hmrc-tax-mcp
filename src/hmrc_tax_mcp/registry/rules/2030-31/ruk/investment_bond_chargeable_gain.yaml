rule_id: investment_bond_chargeable_gain
version: 1.0.0
tax_year: 2030-31
jurisdiction: rUK
title: Investment Bond Chargeable Event Gain (rUK 2030-31)
description: 'Computes the chargeable event gain on an onshore or offshore investment bond. The gain is the excess of proceeds
  received over the total premiums (contributions) paid into the bond, floored at £0 (no negative gains). For top-slicing
  relief, divide the gain by the number of complete policy years to obtain the annual slice. Input variables: `proceeds` —
  total amount received (surrender value or policy proceeds); `total_premiums_paid` — total contributions paid into the bond
  over its life. Returns the chargeable gain in pounds.

  '
dsl_source: '  return round(max(proceeds - total_premiums_paid, 0), 2)

  '
ast:
  node: CALL
  name: round
  args:
  - node: CALL
    name: max
    args:
    - node: SUB
      args:
      - node: VAR
        name: proceeds
      - node: VAR
        name: total_premiums_paid
    - node: CONST
      value: 0
  - node: CONST
    value: 2
