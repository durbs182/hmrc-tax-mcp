rule_id: iht_charity_reduced_rate
version: "1.0.0"
tax_year: "2030-31"
jurisdiction: "rUK"
title: "IHT Reduced Rate for Charitable Legacies"
description: >
  Where at least 10% of the net estate (after NRB and other reliefs but before the charitable legacy) is left to qualifying charities, IHT on the remainder is charged at 36% instead of 40%. Returns the applicable IHT rate as a decimal.
dsl_source: |
  return if charity_amount >= net_estate * 0.10 then 0.36 else 0.40
ast: {"node": "IF", "cond": {"node": "GTE", "args": [{"node": "VAR", "name": "charity_amount"}, {"node": "MUL", "args": [{"node": "VAR", "name": "net_estate"}, {"node": "CONST", "value": 0.1}]}]}, "then": {"node": "CONST", "value": 0.36}, "else": {"node": "CONST", "value": 0.4}}
