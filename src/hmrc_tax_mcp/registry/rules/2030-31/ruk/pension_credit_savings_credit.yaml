rule_id: pension_credit_savings_credit
version: 1.0.0
tax_year: 2030-31
jurisdiction: rUK
title: Pension Credit — Savings Credit (rUK 2030-31)
description: 'Computes the Savings Credit element of Pension Credit. Savings Credit provides a small top-up for pensioners
  who reached State Pension age before 6 April 2016 and have modest savings or income above the basic State Pension level.
  The credit is 60p for every £1 of qualifying income above the Savings Credit threshold (£174.49/week single; £277.12/week
  couple), up to a maximum (£17.29/week single; £19.36/week couple). Not available to those who reached SPA on or after 6
  April 2016. Input variables: `qualifying_income` — weekly income including state pension; `is_couple` — boolean; `reached_spa_before_2016`
  — boolean. Returns weekly Savings Credit in pounds.

  '
dsl_source: "  let threshold = if is_couple then 277.12 else 174.49\n  let max_credit = if is_couple then 19.36 else 17.29\n\
  \  let raw_credit = if qualifying_income > threshold then round((qualifying_income - threshold) * 0.60, 2) else 0\n  return\
  \ if reached_spa_before_2016 then min(raw_credit, max_credit) else 0\n"
ast:
  node: LET
  bindings:
  - - threshold
    - node: IF
      cond:
        node: VAR
        name: is_couple
      then:
        node: CONST
        value: 277.12
      else:
        node: CONST
        value: 174.49
  - - max_credit
    - node: IF
      cond:
        node: VAR
        name: is_couple
      then:
        node: CONST
        value: 19.36
      else:
        node: CONST
        value: 17.29
  - - raw_credit
    - node: IF
      cond:
        node: GT
        args:
        - node: VAR
          name: qualifying_income
        - node: VAR
          name: threshold
      then:
        node: CALL
        name: round
        args:
        - node: MUL
          args:
          - node: SUB
            args:
            - node: VAR
              name: qualifying_income
            - node: VAR
              name: threshold
          - node: CONST
            value: 0.6
        - node: CONST
          value: 2
      else:
        node: CONST
        value: 0
  body:
    node: IF
    cond:
      node: VAR
      name: reached_spa_before_2016
    then:
      node: CALL
      name: min
      args:
      - node: VAR
        name: raw_credit
      - node: VAR
        name: max_credit
    else:
      node: CONST
      value: 0
