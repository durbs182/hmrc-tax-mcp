rule_id: pension_credit_standard_minimum_guarantee
version: 1.0.0
tax_year: 2030-31
jurisdiction: rUK
title: Pension Credit — Standard Minimum Guarantee (rUK 2030-31)
description: 'Returns the Guarantee Credit weekly amount that tops up weekly income to a minimum level for pensioners. The
  Guarantee Credit is the main element of Pension Credit. If a qualifying person''s weekly income falls below this threshold,
  Pension Credit tops it up to this level. Amounts: Single £218.15/week; Couple £332.95/week (2025-26). Input variable: `is_couple`
  — true if applying for a couple, false for single. Returns the weekly minimum guarantee in pounds.

  '
dsl_source: '  return if is_couple then 332.95 else 218.15

  '
ast:
  node: IF
  cond:
    node: VAR
    name: is_couple
  then:
    node: CONST
    value: 332.95
  else:
    node: CONST
    value: 218.15
