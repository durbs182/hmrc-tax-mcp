rule_id: pension_net_pay_arrangement
version: 1.0.0
tax_year: 2030-31
jurisdiction: rUK
title: Pension Net Pay Arrangement — Gross Tax Relief (rUK 2030-31)
description: 'Computes the pension tax relief under a net pay arrangement, where the employer deducts the full gross contribution
  from pay before applying PAYE. The employee automatically receives relief at their marginal rate without needing to claim
  via Self Assessment. Formula: tax_relief = marginal_rate × gross_contribution. Input variables: `marginal_rate` — employee''s
  marginal income tax rate (0.20, 0.40, or 0.45); `gross_contribution` — gross pension contribution deducted from gross pay.
  Returns the total tax relief value in pounds.

  '
dsl_source: '  return round(marginal_rate * gross_contribution, 2)

  '
ast:
  node: CALL
  name: round
  args:
  - node: MUL
    args:
    - node: VAR
      name: marginal_rate
    - node: VAR
      name: gross_contribution
  - node: CONST
    value: 2
