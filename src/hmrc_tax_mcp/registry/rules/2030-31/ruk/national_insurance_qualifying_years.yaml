jurisdiction: "rUK"
title: "National Insurance Qualifying Years Fraction for State Pension"
description: >
  Returns the fraction of the full new State Pension entitlement based on the individual's NI qualifying years. A minimum of 10 years is required for any entitlement; 35 years gives the full entitlement. Between 10 and 34 years the entitlement is proportional.
dsl_source: |
  let fraction = if qualifying_years >= 35 then 1 else if qualifying_years >= 10 then qualifying_years / 35 else 0
  return round(fraction, 4)
