title: Care Home Capital Threshold — Upper Limit (Scotland) (2030-31)
description: 'Returns the upper capital threshold for residential care in Scotland (£32,750 for 2025-26). Social care funding
  in Scotland is devolved. If a person''s capital exceeds £32,750, they must meet the full cost of residential care. Between
  £19,500 and £32,750, means-tested contributions apply. Below £19,500 (lower threshold), capital is generally disregarded.
  Note: Scotland provides free personal care for eligible people over 65 (Personal and Nursing Care). Returns the upper self-funding
  threshold in pounds.

  '
