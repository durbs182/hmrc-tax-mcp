rule_id: pension_tax_relief_higher_rate
version: 1.0.0
tax_year: 2029-30
jurisdiction: rUK
title: Pension Tax Relief — Additional Higher/Additional Rate Relief (rUK 2029-30)
description: 'Computes the additional income tax relief on personal pension contributions for higher-rate or additional-rate
  taxpayers, claimed via Self Assessment. Basic-rate relief (20%) is automatically added by the pension provider on personal
  contributions. Higher-rate payers (40%) can claim an additional 20%; additional-rate payers (45%) can claim 25%. Formula:
  additional relief = (marginal_rate − 0.20) × gross_contribution. Input variables: `marginal_rate` — taxpayer''s marginal
  rate (e.g. 0.40 or 0.45); `gross_contribution` — gross pension contribution (employee net contribution grossed up by 20%).
  Returns additional tax relief due in pounds.

  '
dsl_source: '  return round((marginal_rate - 0.20) * gross_contribution, 2)

  '
ast:
  node: CALL
  name: round
  args:
  - node: MUL
    args:
    - node: SUB
      args:
      - node: VAR
        name: marginal_rate
      - node: CONST
        value: 0.2
    - node: VAR
      name: gross_contribution
  - node: CONST
    value: 2
