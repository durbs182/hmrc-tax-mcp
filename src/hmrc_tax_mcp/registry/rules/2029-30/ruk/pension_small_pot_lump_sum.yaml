rule_id: pension_small_pot_lump_sum
version: 1.0.0
tax_year: 2029-30
jurisdiction: rUK
title: Pension Small Pot Lump Sum — Tax-Free Portion (rUK 2029-30)
description: 'Computes the tax-free portion (25%) of a small pot lump sum commutation. A small pot lump sum can be paid where
  a pension pot value does not exceed £10,000. Up to 3 personal pension pots (and unlimited occupational pension pots) can
  be commuted this way. Crucially, this does NOT trigger the Money Purchase Annual Allowance (MPAA). The remaining 75% of
  the pot is taxed as pension income at the member''s marginal rate. Input variable: `pot_value` — total value of the small
  pot. Returns the tax-free lump sum in pounds. The taxable income is pot_value − result.

  '
dsl_source: '  return round(pot_value * 0.25, 2)

  '
ast:
  node: CALL
  name: round
  args:
  - node: MUL
    args:
    - node: VAR
      name: pot_value
    - node: CONST
      value: 0.25
  - node: CONST
    value: 2
