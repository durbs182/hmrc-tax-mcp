rule_id: income_tax_due
version: "1.0.0"
tax_year: "2029-30"
jurisdiction: rUK
title: Income Tax Due – Multi-Stream Composite (rUK 2029-30)
description: >
  Calculates total income tax due for 2029-30 across all four income streams, reflecting
  the new ordering rules effective from 6 April 2027 (Finance Bill 2025-26). Employment
  and trading income: taxed at 20/40/45%. Property income: taxed at 22/42/47%. Savings
  interest: taxed at 22/42/47%. Dividends: taxed at 10.75/35.75/39.35%. The personal
  allowance (£12,570, tapered above £100,000) is allocated against income in statutory
  order: employment first, then property, then savings, then dividends. The Personal
  Savings Allowance (£1,000 basic-rate / £500 higher-rate / £0 additional-rate) and
  £500 dividend allowance are deducted before applying the respective rates. All income
  streams share the same rate-band thresholds (basic-rate band £37,700 wide; higher
  rate up to £125,140 gross) but are taxed at their category rates — band space consumed
  in order: employment → property → savings → dividends. Applies to rUK (England, Wales,
  Northern Ireland). Scottish residents use Scottish rates for employment income but UK
  rates for savings and dividends. ISA income excluded by convention. Input variables:
  `employment_income`, `property_income`, `savings_income`, `dividend_income` (all
  gross, before personal allowance deduction). Pass 0 for absent income streams.
dsl_source: |
  let total_income = employment_income + property_income + savings_income + dividend_income
  let effective_pa = taper total_income:
    threshold 100000
    ratio 1 per 2
    base 12570
  let emp_pa = min(effective_pa, employment_income)
  let emp_taxable = employment_income - emp_pa
  let pa_after_emp = effective_pa - emp_pa
  let prop_pa = min(pa_after_emp, property_income)
  let prop_taxable = property_income - prop_pa
  let pa_after_prop = pa_after_emp - prop_pa
  let sav_pa = min(pa_after_prop, savings_income)
  let sav_gross = savings_income - sav_pa
  let pa_after_sav = pa_after_prop - sav_pa
  let div_pa = min(pa_after_sav, dividend_income)
  let div_gross = dividend_income - div_pa
  let higher_limit = max(125140 - effective_pa, 0)
  let non_sav_taxable = emp_taxable + prop_taxable
  let psa = if non_sav_taxable > higher_limit then 0 else if non_sav_taxable > 37700 then 500 else 1000
  let sav_taxable = max(sav_gross - psa, 0)
  let div_taxable = max(div_gross - 500, 0)
  let emp_basic = min(emp_taxable, 37700)
  let emp_higher = max(min(emp_taxable, higher_limit) - 37700, 0)
  let emp_additional = max(emp_taxable - higher_limit, 0)
  let emp_tax = emp_basic * 0.20 + emp_higher * 0.40 + emp_additional * 0.45
  let prop_stk_end = emp_taxable + prop_taxable
  let prop_basic = max(min(prop_stk_end, 37700) - emp_taxable, 0)
  let prop_higher = max(min(prop_stk_end, higher_limit) - max(emp_taxable, 37700), 0)
  let prop_additional = max(prop_stk_end - max(emp_taxable, higher_limit), 0)
  let prop_tax = prop_basic * 0.22 + prop_higher * 0.42 + prop_additional * 0.47
  let sav_stk_end = prop_stk_end + sav_taxable
  let sav_basic = max(min(sav_stk_end, 37700) - prop_stk_end, 0)
  let sav_higher = max(min(sav_stk_end, higher_limit) - max(prop_stk_end, 37700), 0)
  let sav_additional = max(sav_stk_end - max(prop_stk_end, higher_limit), 0)
  let sav_tax = sav_basic * 0.22 + sav_higher * 0.42 + sav_additional * 0.47
  let div_stk_end = sav_stk_end + div_taxable
  let div_basic = max(min(div_stk_end, 37700) - sav_stk_end, 0)
  let div_higher = max(min(div_stk_end, higher_limit) - max(sav_stk_end, 37700), 0)
  let div_additional = max(div_stk_end - max(sav_stk_end, higher_limit), 0)
  let div_tax = div_basic * 0.1075 + div_higher * 0.3575 + div_additional * 0.3935
  return round(emp_tax + prop_tax + sav_tax + div_tax, 2)
