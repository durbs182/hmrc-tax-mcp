tax_year: "2029-30"
jurisdiction: "rUK"
title: "Pension Commencement Excess Lump Sum"
description: >
  Tax charge on a pension commencement lump sum that exceeds the Lump Sum Allowance (LSA). The excess is taxed at the individual's marginal rate. From 2024-25 the LSA replaced the Lifetime Allowance (LTA) charge.
dsl_source: |
  return round(excess_lump_sum * marginal_rate, 2)
