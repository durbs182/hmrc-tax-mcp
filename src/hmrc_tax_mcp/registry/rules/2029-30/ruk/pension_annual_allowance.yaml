title: Standard Pension Annual Allowance (rUK 2029-30)
description: 'Returns the standard Pension Annual Allowance of £60,000 — the maximum combined pension input amount (employer
  + employee contributions plus DB accrual) permitted per tax year where neither the Tapered Annual Allowance (TAA) nor the
  Money Purchase Annual Allowance (MPAA) applies. Effective from 6 April 2023 (Finance (No. 2) Act 2023 s.18, increased from
  £40,000). Use pension_tapered_annual_allowance when threshold income exceeds £200,000, or money_purchase_annual_allowance
  when flexible access has been triggered.

  '
