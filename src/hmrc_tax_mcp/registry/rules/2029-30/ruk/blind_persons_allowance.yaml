title: Blind Person's Allowance (rUK 2029-30)
description: 'Returns the Blind Person''s Allowance (BPA) for the tax year. BPA is an additional income tax allowance available
  to registered blind persons (or those with severe sight impairment in Scotland and other regions). It is added to the Personal
  Allowance, giving a higher income threshold before tax is payable. Unused BPA can be transferred to a spouse or civil partner
  if the blind person cannot use it all. BPA is £3,070 for 2025-26 (frozen). Returns allowance in pounds.

  '
