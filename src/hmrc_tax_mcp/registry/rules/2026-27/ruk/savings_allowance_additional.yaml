rule_id: savings_allowance_additional
version: "1.0.0"
tax_year: "2026-27"
jurisdiction: rUK
title: Personal Savings Allowance – Additional Rate (rUK 2026-27)
description: >
  Additional-rate taxpayers (income above £125,140) receive no Personal Savings
  Allowance. All savings interest is taxable at the additional rate. This rule
  returns £0 to make the nil entitlement explicit and queryable.
