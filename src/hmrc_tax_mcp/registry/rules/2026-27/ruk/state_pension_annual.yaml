title: Full New State Pension (Annual, rUK 2026-27)
description: >
  The full new State Pension for 2026-27 is £241.30 per week (after the
  4.8% triple-lock increase applied from April 2026), equating to £12,547.60
  per year (52 weeks). Returns the annual amount. Individuals with incomplete
  NI records receive a proportional amount.
