rule_id: iht_potentially_exempt_transfer
version: 1.0.0
tax_year: 2026-27
jurisdiction: rUK
title: IHT Potentially Exempt Transfer (PET) — Tax Due on Death (rUK 2026-27)
description: 'Computes IHT due on a Potentially Exempt Transfer (PET) if the donor dies within 7 years. A PET is a gift to
  an individual that becomes fully exempt if the donor survives 7 years. If death occurs within 7 years, the gift is included
  in the estate and taxed at 40% on the amount above the remaining nil-rate band, reduced by any taper relief. Input variables:
  `gift_amount` — value of the PET; `nil_rate_band_remaining` — NRB not already used by the estate; `taper_relief_percentage`
  — reduction % from `iht_taper_relief` (0-100). Returns IHT due on the PET in pounds.

  '
dsl_source: "  let gross_tax = round(max(gift_amount - nil_rate_band_remaining, 0) * 0.40, 2)\n  return round(gross_tax *\
  \ (100 - taper_relief_percentage) / 100, 2)\n"
