tax_year: "2026-27"
jurisdiction: rUK
title: Personal Savings Allowance – Higher Rate (rUK 2026-27)
description: >
  Higher-rate taxpayers can earn up to £500 of savings interest tax-free
  per year under the Personal Savings Allowance (PSA). Basic-rate taxpayers
  get £1,000; additional-rate taxpayers get nil. This rule returns the PSA
  for higher-rate taxpayers.
