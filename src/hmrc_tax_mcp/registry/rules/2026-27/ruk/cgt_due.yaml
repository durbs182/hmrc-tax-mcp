rule_id: cgt_due
version: "1.0.0"
tax_year: "2026-27"
jurisdiction: rUK
title: Capital Gains Tax Due – Composite (rUK 2026-27)
description: >
  Calculates Capital Gains Tax due for 2026-27 by applying the annual exempt
  amount (£3,000) and the appropriate rate in a single rule. Gains up to the
  exempt amount are tax-free. For higher/additional-rate taxpayers the rate is
  24%; for basic-rate taxpayers it is 18% (rates unified in Autumn Budget 2024).
  Input variables: `capital_gain` (total gain realised, £) and
  `is_higher_rate_taxpayer` (boolean — use the is_higher_rate_taxpayer rule).
dsl_source: |
  let taxable_gain = max(capital_gain - 3000, 0)
  let rate = if is_higher_rate_taxpayer then 24 else 18
  return round(percent(taxable_gain, rate), 2)
ast:
  node: LET
  bindings:
    - - taxable_gain
      - node: CALL
        name: max
        args:
          - node: SUB
            args:
              - node: VAR
                name: capital_gain
              - node: CONST
                value: 3000
          - node: CONST
            value: 0
    - - rate
      - node: IF
        cond:
          node: VAR
          name: is_higher_rate_taxpayer
        then:
          node: CONST
          value: 24
        else:
          node: CONST
          value: 18
  body:
    node: CALL
    name: round
    args:
      - node: CALL
        name: percent
        args:
          - node: VAR
            name: taxable_gain
          - node: VAR
            name: rate
      - node: CONST
        value: 2
