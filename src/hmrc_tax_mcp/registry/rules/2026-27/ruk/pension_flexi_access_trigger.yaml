rule_id: pension_flexi_access_trigger
version: 1.0.0
tax_year: 2026-27
jurisdiction: rUK
title: Pension Flexi-Access Drawdown Trigger — MPAA Trigger Test (rUK 2026-27)
description: 'Returns true if the type of pension withdrawal triggers the Money Purchase Annual Allowance (MPAA). Withdrawals
  that trigger MPAA: flexi-access drawdown (FAD), Uncrystallised Fund Pension Lump Sum (UFPLS), flexible annuity payments.
  Withdrawals that do NOT trigger MPAA: Pension Commencement Lump Sum (PCLS), lifetime annuity, small pot lump sums, capped
  drawdown (legacy). Input variables: `is_flexi_access_drawdown` — boolean; `is_ufpls` — boolean; `is_flexible_annuity` —
  boolean. Returns true if MPAA is triggered.

  '
dsl_source: '  return is_flexi_access_drawdown or is_ufpls or is_flexible_annuity

  '
ast:
  node: OR
  args:
