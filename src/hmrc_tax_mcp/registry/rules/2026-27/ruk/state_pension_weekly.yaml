title: Full New State Pension (Weekly, rUK 2026-27)
description: 'Returns the weekly rate of the full new State Pension for 2026-27: £241.30. Derived from the annual amount under
  the triple-lock guarantee (highest of CPI inflation, average earnings growth, or 2.5%). The full rate requires 35 qualifying
  National Insurance years; a minimum of 10 years is needed for any State Pension. Weekly rate = annual amount ÷ 52. Applies
  UK-wide (State Pension rates are DWP-set). Rates for later years are not pre-published; only years with confirmed DWP rates
  are registered as rules — use state_pension_annual for the corresponding annual figure.

  '
