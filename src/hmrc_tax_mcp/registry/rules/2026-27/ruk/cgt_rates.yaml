rule_id: cgt_rates
version: "1.0.0"
tax_year: "2026-27"
jurisdiction: rUK
title: Capital Gains Tax Rates (rUK 2026-27)
description: >
  Returns the CGT rate (as a percentage integer) for 2026-27. For higher/additional-
  rate taxpayers: 24%. For basic-rate taxpayers: 18%. Note: these rates apply to
  most assets including residential property from 30 October 2024 (rates unified
  in Autumn Budget 2024). Input variable `is_higher_rate_taxpayer` is a boolean.
dsl_source: |
  return if is_higher_rate_taxpayer then 24 else 18
ast:
  node: IF
  cond:
    node: VAR
    name: is_higher_rate_taxpayer
  then:
    node: CONST
    value: 24
  else:
    node: CONST
    value: 18
