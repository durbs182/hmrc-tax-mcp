rule_id: income_tax_bands
version: "1.0.0"
tax_year: "2026-27"
jurisdiction: rUK
title: Income Tax Bands (rUK 2026-27)
description: >
  Applies the 2026-27 rUK income tax bands using the statutory income thresholds,
  including the personal allowance boundary at £12,570. Input variable
  `taxable_income` must therefore be the relevant income amount BEFORE any
  personal allowance deduction or taper adjustment is applied. Income below
  £12,570 falls outside all rated bands and attracts zero tax.
dsl_source: |
  bands taxable_income:
    12570  to 50270  at 20%
    50270  to 125140 at 40%
    125140+           at 45%
ast:
  node: BAND_APPLY
  args:
    - node: VAR
      name: taxable_income
  bands:
    - lower: 12570
      upper: 50270
      rate: 0.2
    - lower: 50270
      upper: 125140
      rate: 0.4
    - lower: 125140
      upper: null
      rate: 0.45
