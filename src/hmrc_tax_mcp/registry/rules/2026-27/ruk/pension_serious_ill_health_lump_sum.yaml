rule_id: pension_serious_ill_health_lump_sum
version: "1.0.0"
tax_year: "2026-27"
jurisdiction: "rUK"
title: "Pension Serious Ill-Health Lump Sum Tax"
description: >
  Tax on a serious ill-health lump sum commutation. If the member is under 75 and their life expectancy is less than one year, the lump sum is tax-free. If the member is 75 or over, it is taxed at their marginal rate.
dsl_source: |
  return round(if age >= 75 then lump_sum_amount * marginal_rate else 0, 2)
