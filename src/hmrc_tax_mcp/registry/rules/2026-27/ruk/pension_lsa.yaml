title: Pension Lump Sum Allowance (rUK 2026-27)
description: >
  The Pension Lump Sum Allowance (LSA) is the total amount of tax-free pension
  lump sums an individual can take over their lifetime. The LSA for 2026-27
  is £268,275 (25% of the former Lifetime Allowance of £1,073,100). This rule
  returns the allowance amount.
