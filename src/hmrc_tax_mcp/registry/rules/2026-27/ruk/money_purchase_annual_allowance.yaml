rule_id: money_purchase_annual_allowance
version: 1.0.0
tax_year: 2026-27
jurisdiction: rUK
title: Money Purchase Annual Allowance (rUK 2026-27)
description: "Computes the effective Annual Allowance for money-purchase (defined-contribution) pension contributions once\
  \ the Money Purchase Annual Allowance (MPAA) has been, or has not been, triggered. \nThe MPAA is triggered when an individual\
  \ first flexibly accesses their pension savings — for example by entering flexi-access drawdown (FAD), taking an Uncrystallised\
  \ Fund Pension Lump Sum (UFPLS), or receiving income from a flexible annuity. Once triggered, the MPAA limits new money-purchase\
  \ contributions to £10,000 per tax year (2023-24 onwards, up from £4,000). \nWhen MPAA is in force and the individual also\
  \ has defined-benefit (DB) accrual, an Alternative Annual Allowance of £50,000 (£60,000 − £10,000) applies to DB accrual.\
  \ That interaction is not computed here; this rule returns only the money-purchase limit. \nIf the MPAA has not been triggered,\
  \ the standard Annual Allowance of £60,000 (Finance (No. 2) Act 2023) applies to all pension input amounts combined. \n\
  Input variable: `mpaa_triggered` (boolean — true if the individual has flexibly accessed their pension, false otherwise).\
  \ Return value: the money-purchase annual allowance in pounds (£10,000 or £60,000). \nApplies across the UK (pension AA\
  \ is HMRC-set, not devolved). The £10,000 MPAA is unchanged from 2025-26 through 2030-31. "
dsl_source: '  return if mpaa_triggered then 10000 else 60000

  '
