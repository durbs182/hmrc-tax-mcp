rule_id: lifetime_isa_withdrawal_penalty
version: 1.0.0
tax_year: 2026-27
jurisdiction: rUK
title: Lifetime ISA Unauthorised Withdrawal Penalty (rUK 2026-27)
description: 'Computes the 25% HMRC withdrawal charge on an unauthorised Lifetime ISA withdrawal. An unauthorised withdrawal
  occurs when funds are withdrawn before age 60 for a reason other than a first home purchase or terminal illness. The 25%
  charge on the gross withdrawal amount (which includes the bonus) effectively recovers the 25% bonus AND erodes approximately
  6.25% of the original contributions. Input variable: `withdrawal_amount` — gross amount withdrawn including bonus. Returns
  charge in pounds.

  '
dsl_source: '  return round(withdrawal_amount * 0.25, 2)

  '
ast:
  node: CALL
  name: round
  args:
  - node: MUL
    args:
    - node: VAR
      name: withdrawal_amount
    - node: CONST
      value: 0.25
  - node: CONST
    value: 2
