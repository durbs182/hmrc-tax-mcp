title: Dividend Allowance (Scotland 2026-27)
description: >
  Annual dividend allowance for Scottish taxpayers. Dividends up to £500 are free
  of income tax. This is a UK-wide allowance — Scottish Parliament has no power to
  vary dividend taxation.
