tax_year: "2026-27"
jurisdiction: scotland
title: Savings Allowance — Basic Rate (Scotland 2026-27)
description: >
  Annual tax-free savings allowance for Scottish basic-rate taxpayers (those whose
  non-savings income falls in the 20% basic band). Savings income is taxed at UK
  rates regardless of Scottish taxpayer status; the personal savings allowance
  follows UK-wide rules.
