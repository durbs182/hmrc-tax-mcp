rule_id: income_tax_bands
version: "1.0.0"
tax_year: "2026-27"
jurisdiction: scotland
title: Income Tax Bands (Scotland 2026-27)
description: >
  Applies the 2026-27 Scottish income tax bands to non-savings, non-dividend income.
  Scotland operates six rates set by the Scottish Parliament: starter (19%), basic (20%),
  intermediate (21%), higher (42%), advanced (45%) and top (48%). The nil-rate band
  (0–£12,570) reflects the UK-wide personal allowance, so input variable `taxable_income`
  should be the gross amount before deduction of the personal allowance.
dsl_source: |
  bands taxable_income:
    0      to 12570  at 0%
    12570  to 16537  at 19%
    16537  to 29526  at 20%
    29526  to 43662  at 21%
    43662  to 75000  at 42%
    75000  to 125140 at 45%
    125140+          at 48%
